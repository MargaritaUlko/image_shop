
version: '3.8'

services:
  web:
    build: .
    command: sh -c "python /code/image_shop/manage.py makemigrations && 
                python /code/image_shop/manage.py migrate && 
                python /code/image_shop/manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=image_shop.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis
    
  # Добавляем Celery worker
  celery-worker:
    build: .
    command: sh -c "sleep 15 && celery -A image_shop worker --loglevel=info"
    volumes:
      - .:/code
    environment:
      - DJANGO_SETTINGS_MODULE=image_shop.settings  
      - CELERY_BROKER_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:14
    environment:
      - POSTGRES_DB=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Убираем RabbitMQ, т.к. используем Redis
  # rabbitmq:
  #   image: rabbitmq:3.11-management
  #   environment:
  #     RABBITMQ_DEFAULT_USER: admin
  #     RABBITMQ_DEFAULT_PASS: admin123
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   volumes:
  #     - rabbitmq_data:/var/lib/rabbitmq

  # consumer:
  #   build: .
  #   command: sh -c "sleep 10 && python /code/image_shop/manage.py service"
  #   volumes:
  #     - .:/code
  #   depends_on:
  #     - redis
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
