{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .loading-container {
        text-align: center;
        padding: 50px 20px;
        max-width: 600px;
        margin: 0 auto;
    }
    
    .loading-spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #2196F3;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        animation: spin 2s linear infinite;
        margin: 20px auto;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    .loading-text {
        font-size: 1.2em;
        color: #666;
        margin: 20px 0;
    }
    
    .loading-details {
        color: #999;
        font-size: 0.95em;
        margin-top: 15px;
    }
</style>

<div class="loading-container">
    <h1>Генерируем персональные рекомендации</h1>
    
    <div class="loading-spinner"></div>
    
    <div class="loading-text" id="loading-message">
        Анализируем ваши предпочтения...
    </div>
    
    <div class="loading-details">
        {% if liked_images %}
            На основе {{ liked_images|length }} понравившихся работ
        {% else %}
            Подбираем интересные работы для вас
        {% endif %}
    </div>
    
    <div id="recommendations-content"></div>
</div>

<script>
let checkCount = 0;
const messages = [
    "Анализируем ваши предпочтения...",
    "Обрабатываем изображения...",
    "Ищем похожие работы...",
    "Формируем рекомендации..."
];

function updateMessage() {
    const messageEl = document.getElementById('loading-message');
    messageEl.textContent = messages[checkCount % messages.length];
}

function checkRecommendationsStatus() {
    fetch('/api/recommendations-status/')
        .then(response => response.json())
        .then(data => {
            if (data.ready) {
                // Рекомендации готовы - показываем результат
                document.querySelector('.loading-container').innerHTML = data.html;
            } else {
                // Еще не готово - обновляем сообщение и проверяем снова
                checkCount++;
                updateMessage();
                setTimeout(checkRecommendationsStatus, 2000);
            }
        })
        .catch(error => {
            console.error('Ошибка:', error);
            document.getElementById('loading-message').textContent = 
                'Произошла ошибка. Попробуйте обновить страницу.';
        });
}

// Начинаем проверку через 2 секунды
setTimeout(checkRecommendationsStatus, 2000);
</script>

{% endblock %}
