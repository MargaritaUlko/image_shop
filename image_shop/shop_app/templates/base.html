<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtGallery - {% block title %}{% endblock %}</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }
        .messages {
            padding: 1rem;
        }
        .messages .success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
        }
        .artwork-card {
            border: 1px solid #ddd;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
        }
        .artwork-card img {
            max-width: 100%;
            height: auto;
        }
        .price {
            font-weight: bold;
            color: #e74c3c;
            font-size: 1.2rem;
        }
        button, .button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover, .button:hover {
            background: #2980b9;
        }
        .remove-btn {
            color: #e74c3c;
            text-decoration: underline;
        }
        .order-card {
            border: 1px solid #ddd;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
        }
        .status {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.9rem;
        }
        .status.pending { background: #f39c12; color: white; }
        .status.completed { background: #2ecc71; color: white; }
        .status.cancelled { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <header>
        <h1><a href="{% url 'artwork_list' %}">ArtGallery</a></h1>
        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'cart_view' %}">Корзина</a>
                <a href="{% url 'order_history' %}">Мои заказы</a>
                <a href="{% url 'logout' %}">Выйти</a>
            {% else %}
                <a href="{% url 'login' %}">Войти</a>
                <a href="{% url 'register' %}">Регистрация</a>
            {% endif %}
        </nav>
    </header>

    <div class="container">
        {% for message in messages %}
        <div class="messages">
            <div class="{{ message.tags }}">{{ message }}</div>
        </div>
        {% endfor %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
